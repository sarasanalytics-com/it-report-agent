name: IT Monthly Report

on:
  schedule:
    - cron: "30 3 1 * *" # 1st of every month, 9:00 AM IST (UTC+5:30)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run: generate the report & upload the artifact, but DON'T post to Slack or commit the snapshot"
        type: boolean
        default: true

permissions:
  contents: write

env:
  # Run JS actions on Node 24 — clears the Node 20 deprecation warning for any
  # action still pinned to a Node 20 major (e.g. upload-artifact@v4).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 1. Fetch Excel files from SharePoint ──
      - name: Fetch Excel data from SharePoint
        run: python scripts/fetch-excel.py
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          ASSET_FILE_PATH: ${{ secrets.ASSET_FILE_PATH }}
          SPEND_FILE_PATH: ${{ secrets.SPEND_FILE_PATH }}
          PROCUREMENT_FILE_PATH: ${{ secrets.PROCUREMENT_FILE_PATH }}
          JOINERS_FILE_PATH: ${{ secrets.JOINERS_FILE_PATH }}
          VENDOR_FILE_PATH: ${{ secrets.VENDOR_FILE_PATH }}

      # ── 1b. Fetch IT tickets from ClickUp (best-effort; placeholder if unset) ──
      - name: Fetch IT issues from ClickUp
        run: python scripts/fetch-issues.py
        continue-on-error: true
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_IT_ISSUES_LIST_ID: ${{ secrets.CLICKUP_IT_ISSUES_LIST_ID }}

      # ── 2. Validate downloaded data ──
      - name: Validate Excel files
        run: python scripts/validate-data.py

      # ── 3. Generate report (pure Python, no API calls) ──
      - name: Generate monthly report
        run: python scripts/generate-report.py monthly
        env:
          # INR→USD conversion rate for laptop procurement & budget figures.
          # Leave the secret unset to use the built-in default (≈ ₹85.5/$).
          INR_TO_USD_RATE: ${{ secrets.INR_TO_USD_RATE }}

      # ── 4. Post the report summary to Slack (text only; skipped on dry runs) ──
      - name: Post to Slack
        if: ${{ inputs.dry_run != true }}
        run: python scripts/post-to-slack.py output/slack-summary.md
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_IT_REPORTS }}

      # ── 6. Commit updated snapshot back to repo (skipped on dry runs) ──
      - name: Commit snapshot
        if: ${{ success() && inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain snapshots/)" ]; then
            git add snapshots/
            git commit -m "chore: update monthly snapshot ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No snapshot changes to commit."
          fi

      # ── 7. Upload reports as artifacts ──
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ github.run_id }}
          path: output/
          retention-days: 90
