name: IT Monthly Report

on:
  schedule:
    - cron: "30 3 1 * *" # 1st of every month, 9:00 AM IST (UTC+5:30)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 1. Fetch Excel files from SharePoint ──
      - name: Fetch Excel data from SharePoint
        run: python scripts/fetch-excel.py
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          SHAREPOINT_SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          ASSET_FILE_PATH: ${{ secrets.ASSET_FILE_PATH }}
          SPEND_FILE_PATH: ${{ secrets.SPEND_FILE_PATH }}
          PROCUREMENT_FILE_PATH: ${{ secrets.PROCUREMENT_FILE_PATH }}
          JOINERS_FILE_PATH: ${{ secrets.JOINERS_FILE_PATH }}

      # ── 2. Validate downloaded data ──
      - name: Validate Excel files
        run: python scripts/validate-data.py

      # ── 3. Generate report (pure Python, no API calls) ──
      - name: Generate monthly report
        run: python scripts/generate-report.py monthly

      # ── 4. Convert full report to Word document ──
      - name: Generate Word document
        run: |
          MONTH_YEAR=$(date -u +"%B-%Y")
          python scripts/generate-docx.py \
            output/full-report.md \
            "output/IT-Monthly-Report-${MONTH_YEAR}.docx"

      # ── 5. Post summary + Word doc to Slack ──
      - name: Post to Slack
        run: |
          DOCX_FILE=$(ls output/*.docx 2>/dev/null | head -1)
          python scripts/post-to-slack.py \
            output/slack-summary.md \
            ${DOCX_FILE:+"$DOCX_FILE"}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL_IT_REPORTS }}

      # ── 6. Commit updated snapshot back to repo ──
      - name: Commit snapshot
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain snapshots/)" ]; then
            git add snapshots/
            git commit -m "chore: update monthly snapshot ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No snapshot changes to commit."
          fi

      # ── 7. Upload reports as artifacts ──
      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-report-${{ github.run_id }}
          path: output/
          retention-days: 90
