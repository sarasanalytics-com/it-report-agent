# Slack app manifest for the IT bot.
# Create the app at https://api.slack.com/apps → "From an app manifest",
# paste this in, then install to the workspace.
display_information:
  name: IT Helper
  description: Ask about company laptops, new-joiner readiness, IT requests and spend.
  background_color: "#2c2d30"
features:
  bot_user:
    display_name: IT Helper
    always_online: true
  app_home:
    home_tab_enabled: true          # one-pager "what I can help with" view
    messages_tab_enabled: true       # let people DM the bot from its profile
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read   # see @mentions in channels
      - chat:write          # post replies
      - files:write         # upload the vendor list as Excel + image
      - im:history          # read DMs sent to the bot
      - im:read             # detect DM channels
      - im:write            # open/DM the user
settings:
  event_subscriptions:
    bot_events:
      - app_mention         # @mentioned in a channel
      - message.im          # direct message to the bot
      - app_home_opened     # someone opened the bot's Home tab
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true # no public URL needed
  token_rotation_enabled: false
